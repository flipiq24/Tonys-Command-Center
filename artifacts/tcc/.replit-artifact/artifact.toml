kind = "web"
previewPath = "/"
title = "Tony's Command Center"
version = "1.0.0"
id = "artifacts/tcc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19415

[services.development]
run = "pnpm --filter @workspace/tcc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tcc", "run", "build" ]
publicDir = "artifacts/tcc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19415"
BASE_PATH = "/"
